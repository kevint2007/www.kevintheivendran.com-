<!-- Keep - override to add code to <header /> tag -->
<style>
  body.dark-mode {
    background-color: #121212 !important;
    color: #e0e0e0 !important;
  }
  body.dark-mode a {
    color: #5ea8ff !important; 
  }
  body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode p, body.dark-mode li, body.dark-mode strong {
    color: #e0e0e0 !important;
  }
  .theme-toggle-btn {
    cursor: pointer;
    user-select: none;
    margin-left: 15px;
    font-weight: bold;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Create the button if it doesn't exist yet
    let toggleBtn = document.getElementById("theme-toggle");
    if (!toggleBtn) {
      toggleBtn = document.createElement("a");
      toggleBtn.id = "theme-toggle";
      toggleBtn.className = "theme-toggle-btn";
      
      // 2. Find the navigation bar and attach the button
      const nav = document.querySelector("nav") || document.querySelector(".menu") || document.body;
      nav.appendChild(toggleBtn);
    }

    // 3. Set the correct icon based on memory
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
      toggleBtn.innerText = "☼";
    } else {
      toggleBtn.innerText = "☾";
    }

    // 4. Handle clicks
    toggleBtn.addEventListener("click", function() {
      document.body.classList.toggle("dark-mode");
      if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        toggleBtn.innerText = "☼"; 
      } else {
        localStorage.setItem("theme", "light");
        toggleBtn.innerText = "☾"; 
      }
    });
  });
</script>
